<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvenPro | Dashboard de Productos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">
                    <i data-lucide="layers"></i>
                </div>
                <h2>InvenPro</h2>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Inventario</span>
                </a>
            </nav>

            <div class="user-profile">
                <div class="avatar">
                    <i data-lucide="user"></i>
                </div>
                <div class="user-info">
                    <span class="user-name">Administrador</span>
                    <span class="user-status"><span class="dot"></span> Base de Datos Activa</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="page-title">
                    <h1>Catálogo de Productos</h1>
                    <p>Gestiona los artículos de tu inventario en tiempo real.</p>
                </div>
                <div class="topbar-actions">
                    <div class="search-bar">
                        <i data-lucide="search"></i>
                        <input type="text" id="buscador" placeholder="Buscar productos por nombre...">
                    </div>
                    <button class="btn-icon" title="Notificaciones" aria-label="Notificaciones">
                        <i data-lucide="bell"></i>
                    </button>
                </div>
            </header>

            <div class="content-grid">
                
                <!-- Formulario -->
                <div class="panel form-panel">
                    <div class="panel-header">
                        <h2 id="form-title">Nuevo Producto</h2>
                        <i data-lucide="package-plus" class="text-accent"></i>
                    </div>

                    <form id="producto-form">
                        <input type="hidden" id="producto-id">
                        
                        <div class="form-group">
                            <label for="nombre">Nombre del producto</label>
                            <input type="text" id="nombre" name="nombre" placeholder="Ej. Laptop Gamer X" required minlength="2" maxlength="100">
                        </div>

                        <div class="form-group">
                            <label for="descripcion">Descripción</label>
                            <textarea id="descripcion" name="descripcion" placeholder="Detalles del producto..." required minlength="5" rows="2"></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="precio">Precio (S/)</label>
                                <div class="input-icon">
                                    <i data-lucide="coins"></i>
                                    <input type="number" id="precio" name="precio" placeholder="0.00" required min="0" step="0.01">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="stock">Stock disponible</label>
                                <div class="input-icon">
                                    <i data-lucide="boxes"></i>
                                    <input type="number" id="stock" name="stock" placeholder="0" required min="0" step="1">
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="categoria">Categoría</label>
                            <div class="select-wrapper">
                                <select id="categoria" name="categoria" required>
                                    <option value="" disabled selected>Selecciona una categoría</option>
                                    <option value="Electrónica">Electrónica</option>
                                    <option value="Ropa">Ropa</option>
                                    <option value="Alimentos">Alimentos</option>
                                    <option value="Hogar">Hogar</option>
                                    <option value="Deportes">Deportes</option>
                                    <option value="Libros">Libros</option>
                                </select>
                                <i data-lucide="chevron-down" class="select-icon"></i>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" id="btn-guardar" class="btn btn-primary">
                                Guardar Producto
                            </button>
                            <button type="button" id="btn-cancelar" class="btn btn-secondary" style="display: none;">
                                Cancelar
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Lista de Productos -->
                <div class="panel list-panel">
                    <div class="panel-header with-action">
                        <div class="title-wrap">
                            <h2>Inventario Actual</h2>
                            <span class="badge-count">Activos</span>
                        </div>
                        <button onclick="cargarProductos()" class="btn btn-outline btn-refresh">
                            <i data-lucide="refresh-ccw"></i> Sincronizar
                        </button>
                    </div>

                    <div id="mensaje" class="mensaje" style="display: none;"></div>

                    <div class="table-container">
                        <table id="tabla-productos">
                            <thead>
                                <tr>
                                    <th>Producto</th>
                                    <th>Detalles</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th>Categoría</th>
                                    <th class="text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-productos">
                                <tr>
                                    <td colspan="6" class="loading-state">
                                        <div class="spinner"></div>
                                        <p>Conectando con MongoDB Atlas...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();
    </script>
    <script src="app.js"></script>
</body>
</html>
